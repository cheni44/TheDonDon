<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Spatial Trace | 建築配置探索</title>
    <link rel="preconnect" href="https://tile.openstreetmap.org" />
    <link rel="stylesheet" href="./styles.css?v=item-overlay-1" />
  </head>
  <body>
    <main class="app-shell">
      <section class="stage" aria-label="互動地圖與建築配置圖">
        <div class="map-zone">
          <div id="mapPanel" class="map-panel">
            <div id="tileGrid" class="tile-grid" aria-hidden="true"></div>
            <canvas id="flowCanvas" class="flow-canvas" aria-hidden="true"></canvas>
            <div id="buildingLayer" class="building-layer" aria-hidden="true"></div>
            <div id="selectionMarker" class="selection-marker" aria-hidden="true"></div>
            <div class="map-controls" aria-label="地圖控制">
              <button id="zoomInButton" class="map-control-button" type="button" title="放大">+</button>
              <button id="zoomOutButton" class="map-control-button" type="button" title="縮小">−</button>
              <span id="zoomBadge" class="zoom-badge">Z16</span>
            </div>
            <a class="map-attribution" href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">© OpenStreetMap contributors</a>
            <div id="scanBurst" class="scan-burst" aria-hidden="true"></div>
          </div>

          <section id="layoutPanel" class="layout-panel" aria-label="樓層與配置檢視" aria-hidden="true">
            <div class="layout-controls" aria-label="配置圖控制">
              <button id="layoutZoomInButton" class="layout-control-button" type="button" title="放大配置圖">+</button>
              <button id="layoutZoomOutButton" class="layout-control-button" type="button" title="縮小配置圖">−</button>
            </div>
            <div class="floor-wrap">
              <svg id="floorPlan" viewBox="0 0 420 300" role="img" aria-label="建築內部配置圖"></svg>
            </div>
          </section>

          <div id="loadingOverlay" class="loading-overlay" aria-live="polite" aria-hidden="true">
            <div class="loading-pulse" aria-hidden="true"></div>
            <div>
              <p id="loadingText" class="loading-title">正在下載開放建築資料</p>
              <p id="loadingDetail" class="loading-detail">讀取 OSM / OpenBuildingMap footprint</p>
            </div>
          </div>
        </div>

        <aside id="controlPanel" class="control-panel" aria-label="位置與建築選擇">
          <div class="brand-row">
            <span class="brand-mark" aria-hidden="true"></span>
            <div>
              <p class="eyebrow">Open Data Spatial System</p>
              <h1>Spatial Trace</h1>
            </div>
            <button id="locateButton" class="back-button" type="button" title="使用 IP 取得大略位置">IP 定位</button>
          </div>

          <div class="panel-section location-section">
            <form id="addressForm" class="address-form">
              <input id="addressInput" class="address-input" type="search" autocomplete="street-address" placeholder="輸入住址、選附近位置，或在地圖長按" />
              <div id="pickerMenu" class="picker-menu" role="listbox" hidden></div>
              <datalist id="placeOptions"></datalist>
            </form>
            <button id="refreshPlaces" class="icon-button compact-icon refresh-inline" type="button" title="重新搜尋附近位置">↻</button>
            <p id="sourceSummary" class="source-summary" hidden>資料來源：尚未查詢</p>
          </div>

          <div class="panel-section collection-section">
            <label class="compact-field">
              <span>範圍</span>
              <select id="radiusSelect">
                <option value="1">1 km</option>
                <option value="5">5 km</option>
                <option value="10" selected>10 km</option>
                <option value="50">50 km</option>
                <option value="100">100 km</option>
                <option value="500">500 km</option>
                <option value="1000">1000 km</option>
              </select>
            </label>
            <label class="compact-field">
              <span>資料</span>
              <select id="dataTypeSelect">
                <option value="building">building 規劃</option>
                <option value="species">生物物種 GBIF</option>
                <option value="trail">步道</option>
                <option value="peak">山峰高度與名稱</option>
                <option value="sports">體育賽事</option>
                <option value="music">音樂節慶</option>
              </select>
            </label>
          </div>

          <div id="timeSection" class="panel-section time-section" hidden>
            <label class="compact-field">
              <span>開始</span>
              <input id="timeStartInput" type="date" />
            </label>
            <label class="compact-field">
              <span>結束</span>
              <input id="timeEndInput" type="date" />
            </label>
          </div>

          <div class="panel-section result-section">
            <label class="compact-field result-picker">
              <span>集錦項目</span>
              <select id="resultSelect">
                <option value="">尚未選定位置</option>
              </select>
            </label>
            <div id="resultDetail" class="result-detail" aria-live="polite"></div>
          </div>

          <div class="panel-section floor-section">
            <div class="section-heading">
              <h2>樓層</h2>
              <div class="inline-actions">
                <button id="exportButton" class="icon-button compact-icon" type="button" title="匯出 SVG">⇩</button>
              </div>
            </div>
            <div id="floorList" class="floor-list" aria-live="polite"></div>
          </div>

          <div id="statusCard" class="status-card compact-status">
            <p class="status-label">目前流程</p>
            <p id="statusText" class="status-text">等待定位訊號</p>
            <div class="progress-rail" aria-hidden="true">
              <span id="progressBar"></span>
            </div>
          </div>
        </aside>
      </section>
    </main>

    <script src="./app.js?v=item-overlay-1" type="module"></script>
  </body>
</html>
