<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Spatial Trace | 建築配置探索</title>
    <link rel="preconnect" href="https://tile.openstreetmap.org" />
    <link rel="stylesheet" href="./styles.css?v=layout-2" />
  </head>
  <body>
    <main class="app-shell">
      <section class="stage" aria-label="互動地圖與建築配置圖">
        <div id="mapPanel" class="map-panel">
          <div id="tileGrid" class="tile-grid" aria-hidden="true"></div>
          <canvas id="flowCanvas" class="flow-canvas" aria-hidden="true"></canvas>
          <div id="buildingLayer" class="building-layer" aria-hidden="true"></div>
          <div id="selectionMarker" class="selection-marker" aria-hidden="true"></div>
          <button id="locateButton" class="locate-button" type="button" title="重新定位">
            <span aria-hidden="true">◎</span>
            <span class="sr-only">重新定位</span>
          </button>
          <div class="map-controls" aria-label="地圖控制">
            <button id="zoomInButton" class="map-control-button" type="button" title="放大">+</button>
            <button id="zoomOutButton" class="map-control-button" type="button" title="縮小">−</button>
            <span id="zoomBadge" class="zoom-badge">Z16</span>
          </div>
          <a class="map-attribution" href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">© OpenStreetMap contributors</a>
          <div id="scanBurst" class="scan-burst" aria-hidden="true"></div>
        </div>

        <aside class="control-panel" aria-label="位置與建築選擇">
          <div class="brand-row">
            <span class="brand-mark" aria-hidden="true"></span>
            <div>
              <p class="eyebrow">Open Data Spatial System</p>
              <h1>Spatial Trace</h1>
            </div>
          </div>

          <div class="panel-section floor-section">
            <div class="section-heading">
              <h2>樓層與 Layout</h2>
              <button id="exportButton" class="icon-button" type="button" title="匯出 SVG">⇩</button>
            </div>
            <div id="floorList" class="floor-list" aria-live="polite"></div>
            <div class="floor-wrap">
              <svg id="floorPlan" viewBox="0 0 420 300" role="img" aria-label="建築內部配置圖"></svg>
            </div>
          </div>

          <div class="panel-section location-section">
            <div class="section-heading compact-heading">
              <h2>定位與附近位置</h2>
              <button id="refreshPlaces" class="icon-button compact-icon" type="button" title="重新搜尋附近位置">↻</button>
            </div>
            <form id="addressForm" class="address-form">
              <input id="addressInput" class="address-input" type="search" autocomplete="street-address" placeholder="輸入住址或地標" />
              <button class="primary-button" type="submit">定位</button>
            </form>
            <select id="placeSelect" class="place-select" aria-label="附近位置"></select>
          </div>

          <div class="panel-section building-section">
            <div class="section-heading">
              <h2>建築物輪廓</h2>
            </div>
            <p id="sourceSummary" class="source-summary">資料來源：尚未查詢</p>
            <select id="buildingSelect" class="place-select building-select" aria-label="一公里內有資料的建築"></select>
          </div>

          <div id="statusCard" class="status-card compact-status">
            <p class="status-label">目前流程</p>
            <p id="statusText" class="status-text">等待定位訊號</p>
            <div class="progress-rail" aria-hidden="true">
              <span id="progressBar"></span>
            </div>
          </div>

        </aside>
      </section>
    </main>

    <script src="./app.js?v=radius-1km" type="module"></script>
  </body>
</html>
