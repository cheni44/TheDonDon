<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="以地圖選國家、年代區間與重大經濟事件，納入經濟結構與社會人口結構，模擬 GDP、通膨、匯率、利率、股市、失業與經常帳影響。">
    <meta name="theme-color" content="#0f8b8d">
    <meta property="og:title" content="經濟事件地圖模擬">
    <meta property="og:description" content="選擇國家、年代區間與重大事件，查看各項經濟參數的方向性影響。">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://cheni44.github.io/TheDonDon/economic-simulation-map/">
    <title>經濟事件地圖模擬</title>
    <link rel="canonical" href="https://cheni44.github.io/TheDonDon/economic-simulation-map/">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="map-panel" aria-label="國家地圖選擇">
        <div class="topbar">
          <div>
            <p class="eyebrow">1990-2026</p>
            <h1>經濟事件地圖模擬</h1>
          </div>
          <div class="selected-chip" id="selectedCountryChip">台灣</div>
        </div>

        <div class="map-wrap">
          <svg id="worldMap" viewBox="0 0 1000 520" role="img" aria-label="世界地圖，可點選德國、英國、印度、中國、台灣、日本、美國">
            <defs>
              <linearGradient id="sea" x1="0" x2="1" y1="0" y2="1">
                <stop offset="0%" stop-color="#d8f0ee"></stop>
                <stop offset="100%" stop-color="#f4e9cf"></stop>
              </linearGradient>
              <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
                <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#20302d" flood-opacity="0.15"></feDropShadow>
              </filter>
            </defs>
            <rect width="1000" height="520" rx="8" fill="url(#sea)"></rect>
            <g class="graticule">
              <path d="M80 130 H920 M80 250 H920 M80 370 H920"></path>
              <path d="M180 70 V450 M360 70 V450 M540 70 V450 M720 70 V450 M880 70 V450"></path>
            </g>
            <g class="land" filter="url(#softShadow)">
              <path d="M98 142 C145 94 231 80 286 117 C332 148 333 208 284 234 C244 256 202 241 162 261 C118 283 75 260 70 214 C67 184 76 164 98 142 Z"></path>
              <path d="M224 260 C281 241 339 265 360 315 C382 367 339 428 273 436 C224 441 183 410 177 359 C172 315 189 277 224 260 Z"></path>
              <path d="M448 131 C489 93 564 100 601 142 C636 181 615 231 561 235 C509 239 451 215 431 179 C421 159 428 144 448 131 Z"></path>
              <path d="M516 223 C576 213 633 247 652 306 C673 370 624 440 554 433 C504 428 480 381 493 327 C502 291 493 244 516 223 Z"></path>
              <path d="M630 141 C706 87 834 101 898 165 C948 215 924 296 842 309 C777 319 728 288 675 304 C625 319 579 290 582 238 C584 197 599 164 630 141 Z"></path>
              <path d="M735 319 C766 304 812 313 836 344 C861 377 846 423 806 435 C762 449 717 423 710 380 C706 354 715 330 735 319 Z"></path>
            </g>
            <g id="countryMarkers"></g>
          </svg>
        </div>
      </section>

      <section class="control-panel" aria-label="模擬控制與結果">
        <div class="control-grid">
          <label>
            年代區間
            <select id="periodSelect"></select>
          </label>
          <label>
            重大事件
            <select id="eventSelect"></select>
          </label>
          <label class="intensity-control">
            <span>事件強度 <strong id="intensityValue">1.0x</strong></span>
            <input id="intensitySlider" type="range" min="0.5" max="2" value="1" step="0.1">
          </label>
        </div>

        <div class="event-summary" id="eventSummary"></div>
        <p class="model-note">社會人口參數採用年齡結構、僑民網絡、社會信任、技能深度、多元協調與不均壓力等可觀測面向；不以人種或血統作為固定經濟能力假設。</p>

        <div class="result-head">
          <div>
            <p class="eyebrow">模擬結果</p>
            <h2 id="resultTitle">台灣 · 2020-2024</h2>
          </div>
          <div class="score-badge" id="riskBadge">中度壓力</div>
        </div>

        <div class="metrics" id="metrics"></div>

        <div class="chart-panel">
          <div class="chart-head">
            <h3>參數影響</h3>
            <span>負值代表壓力，正值代表支撐</span>
          </div>
          <div class="bar-chart" id="barChart"></div>
        </div>

        <div class="profile-panel">
          <div>
            <h3>當期國家結構與社會人口</h3>
            <p id="profileNote"></p>
          </div>
          <div class="profile-grid" id="profileGrid"></div>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
