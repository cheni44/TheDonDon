name: Deploy AI Vibe Projects to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Build the unified site:
      #   portal/          → _site/          (landing page at /)
      #   mosquito-detector-web/ → _site/mosquito-detector-web/
      #   rainy-drive/     → _site/rainy-drive/
      #   building-footprint-map/ → _site/building-footprint-map/
      #   economic-simulation-map/ → _site/economic-simulation-map/
      - name: Build unified site
        run: |
          mkdir -p _site
          cp -r portal/. _site/
          cp -r mosquito-detector-web _site/mosquito-detector-web
          cp -r rainy-drive _site/rainy-drive
          cp -r building-footprint-map _site/building-footprint-map
          cp -r economic-simulation-map _site/economic-simulation-map

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
